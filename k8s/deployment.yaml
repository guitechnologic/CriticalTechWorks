apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctw-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ctw-app
  template:
    metadata:
      labels:
        app: ctw-app
    spec:
      containers:
      - name: ctw-app
        image: ghcr.io/guitechnologic/criticaltechworks/ctw-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000