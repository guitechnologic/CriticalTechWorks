- name: Install Docker on all nodes
  hosts: apps
  become: yes

  tasks:

    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Enable Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes